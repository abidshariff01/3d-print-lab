<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintLab — 3D Print Lab Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(at 20% 20%, rgba(249,115,22,0.08) 0, transparent 50%),
                              radial-gradient(at 80% 80%, rgba(59,130,246,0.06) 0, transparent 50%);
        }
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-logo {
            width: 52px; height: 52px;
            background: #f97316;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .brand h1 { font-size: 1.5rem; font-weight: 700; }
        .brand p { color: #8b949e; font-size: 0.9rem; margin-top: 0.25rem; }

        .auth-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
        }
        .tab-switcher {
            display: flex;
            background: #0d1117;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 1.75rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            color: #8b949e;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #f97316;
            color: white;
        }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        
        .form-group { margin-bottom: 1.1rem; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8b949e;
            margin-bottom: 0.4rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #f97316;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #ea6c0a; }
        .error-msg {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            color: #f85149;
            padding: 0.6rem 0.85rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .admin-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .admin-link a { color: #8b949e; text-decoration: none; }
        .admin-link a:hover { color: #e6edf3; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="brand">
        <div class="brand-logo"><i class="fa-solid fa-cube" style="color:white"></i></div>
        <h1>PrintLab</h1>
        <p>3D Print Lab Management System</p>
    </div>

    <div class="auth-card">
        <div class="tab-switcher">
            <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <!-- SIGN IN -->
        <div id="panel-signin" class="form-panel active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="doLogin()">Sign In to Dashboard</button>
        </div>

        <!-- SIGN UP -->
        <div id="panel-signup" class="form-panel">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Md Abid">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="abid01">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="you@example.com">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Mobile (for SMS)</label>
                    <input type="tel" id="reg-phone" placeholder="+91 12345 67890">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="reg-dept" placeholder="Mech. Engineering">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min. 6 characters">
            </div>
            <button class="btn-primary" onclick="doRegister()">Create Account</button>
        </div>
    </div>

    <div class="admin-link">
        <a href="/admin_login"><i class="fa-solid fa-lock"></i> Lab Admin Access</a>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    event.target.classList.add('active');
    document.getElementById('error-msg').style.display = 'none';
}
function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
}
async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showError('Please fill in all fields.');
    const res = await fetch('/api/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (data.success) window.location.href = '/student';
    else showError(data.error);
}
async function doRegister() {
    const body = {
        name: document.getElementById('reg-name').value.trim(),
        username: document.getElementById('reg-username').value.trim(),
        email: document.getElementById('reg-email').value.trim(),
        phone: document.getElementById('reg-phone').value.trim(),
        department: document.getElementById('reg-dept').value.trim(),
        password: document.getElementById('reg-password').value
    };
    if (!body.name || !body.username || !body.email || !body.password) return showError('Please fill in all required fields.');
    if (body.password.length < 6) return showError('Password must be at least 6 characters.');
    const res = await fetch('/api/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) window.location.href = '/student';
    else showError(data.error);
}
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const active = document.querySelector('.form-panel.active').id;
        if (active === 'panel-signin') doLogin();
        else doRegister();
    }
});
</script>
</body>
</html>

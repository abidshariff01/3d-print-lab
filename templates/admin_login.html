<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - 3D Print Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .error-msg {
            color: var(--danger);
            background: rgba(244, 63, 94, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            text-align: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }
    </style>
</head>
<body>
    <div class="app-container login-container">
        <div class="card glass-card login-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--success);"></i>
                <h2 class="mt-4">Lab Admin Portal</h2>
                <p class="subtitle">Secure Manager Access</p>
            </div>
            
            {% if error %}
            <div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> {{ error }}</div>
            {% endif %}

            <form action="/admin_login" method="POST">
                <div class="form-group">
                    <label>Master Password</label>
                    <input type="password" name="password" required placeholder="••••••••••••">
                </div>
                <button type="submit" class="btn btn-success w-full" style="justify-content: center; font-size: 1.1rem; padding: 0.75rem;"><i class="fa-solid fa-unlock-keyhole"></i> Authenticate</button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem;">
                <a href="/" class="subtitle" style="text-decoration: none; color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i> Back to Student Login</a>
            </div>
        </div>
    </div>
</body>
</html>
